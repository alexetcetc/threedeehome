<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Digital Library</title>
  <meta name="description" content="A personal 3D library space">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene background="color: #1a1a2e">

    <!-- Camera with WASD movement and mouse look -->
    <a-entity id="rig" position="0 0 4">
      <a-entity
        camera
        look-controls="pointerLockEnabled: true"
        wasd-controls="acceleration: 30"
        position="0 1.6 0">
      </a-entity>
    </a-entity>

    <!-- Lighting -->
    <a-light type="ambient" color="#404040" intensity="0.4"></a-light>
    <a-light type="point" position="0 4 0" intensity="1" color="#ffeecc" decay="2" distance="15"></a-light>
    <a-light type="point" position="-4 3 -4" intensity="0.5" color="#ccddff" decay="2" distance="10"></a-light>
    <a-light type="point" position="4 3 -4" intensity="0.5" color="#ccddff" decay="2" distance="10"></a-light>

    <!-- Room: Floor -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="12"
      height="12"
      color="#2d2d44"
      material="roughness: 0.8">
    </a-plane>

    <!-- Room: Ceiling -->
    <a-plane
      position="0 5 0"
      rotation="90 0 0"
      width="12"
      height="12"
      color="#1a1a2e">
    </a-plane>

    <!-- Room: Back Wall -->
    <a-plane
      position="0 2.5 -6"
      width="12"
      height="5"
      color="#252538">
    </a-plane>

    <!-- Room: Left Wall -->
    <a-plane
      position="-6 2.5 0"
      rotation="0 90 0"
      width="12"
      height="5"
      color="#252538">
    </a-plane>

    <!-- Room: Right Wall -->
    <a-plane
      position="6 2.5 0"
      rotation="0 -90 0"
      width="12"
      height="5"
      color="#252538">
    </a-plane>

    <!-- Room: Front Wall (with gap for entrance feel) -->
    <a-plane
      position="0 2.5 6"
      rotation="0 180 0"
      width="12"
      height="5"
      color="#252538">
    </a-plane>

    <!-- ==================== BOOKSHELVES ==================== -->

</html>
