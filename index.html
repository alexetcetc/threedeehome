<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Digital Library</title>
  <meta name="description" content="A personal 3D library space">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #book-info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 15px 25px;
      border-radius: 8px;
      font-family: Georgia, serif;
      font-size: 16px;
      max-width: 500px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    #book-info.visible { opacity: 1; }
    #book-info .title { font-weight: bold; margin-bottom: 5px; }
    #book-info .author { color: #aaa; font-style: italic; }
    #book-info .sample { color: #f90; font-size: 12px; margin-top: 5px; }
    #stats {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #666;
      font-family: monospace;
      font-size: 12px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="book-info">
    <div class="title"></div>
    <div class="author"></div>
    <div class="sample"></div>
  </div>
  <div id="stats">Loading library...</div>

  <a-scene background="color: #1a1a2e">

    <!-- Camera with WASD movement and mouse look -->
    <a-entity id="rig" position="0 0 4">
      <a-entity
        id="camera"
        camera
        look-controls="pointerLockEnabled: true"
        wasd-controls="acceleration: 30"
        position="0 1.6 0"
        raycaster="objects: .book; far: 5"
        cursor="rayOrigin: mouse">
      </a-entity>
    </a-entity>

    <!-- Lighting -->
    <a-light type="ambient" color="#404040" intensity="0.4"></a-light>
    <a-light type="point" position="0 4 0" intensity="1" color="#ffeecc" decay="2" distance="15"></a-light>
    <a-light type="point" position="-4 3 -4" intensity="0.5" color="#ccddff" decay="2" distance="10"></a-light>
    <a-light type="point" position="4 3 -4" intensity="0.5" color="#ccddff" decay="2" distance="10"></a-light>

    <!-- Room: Floor -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="12" height="12" color="#2d2d44" material="roughness: 0.8"></a-plane>

    <!-- Room: Ceiling -->
    <a-plane position="0 5 0" rotation="90 0 0" width="12" height="12" color="#1a1a2e"></a-plane>

    <!-- Room: Walls -->
    <a-plane position="0 2.5 -6" width="12" height="5" color="#252538"></a-plane>
    <a-plane position="-6 2.5 0" rotation="0 90 0" width="12" height="5" color="#252538"></a-plane>
    <a-plane position="6 2.5 0" rotation="0 -90 0" width="12" height="5" color="#252538"></a-plane>
    <a-plane position="0 2.5 6" rotation="0 180 0" width="12" height="5" color="#252538"></a-plane>

    <!-- Bookshelves (frames only - books added dynamically) -->

    <!-- Back Wall Bookshelf -->
    <a-entity id="bookshelf-back" position="0 0 -5.5">
      <a-box position="0 2 0" width="6" height="4" depth="0.4" color="#4a3728"></a-box>
      <a-box position="0 0.5 0.1" width="5.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 1.3 0.1" width="5.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 2.1 0.1" width="5.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 2.9 0.1" width="5.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 3.7 0.1" width="5.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
    </a-entity>

    <!-- Left Wall Bookshelf -->
    <a-entity id="bookshelf-left" position="-5.5 0 -2" rotation="0 90 0">
      <a-box position="0 1.5 0" width="4" height="3" depth="0.4" color="#4a3728"></a-box>
      <a-box position="0 0.4 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 1.1 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 1.8 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 2.5 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
    </a-entity>

    <!-- Right Wall Bookshelf -->
    <a-entity id="bookshelf-right" position="5.5 0 -2" rotation="0 -90 0">
      <a-box position="0 1.5 0" width="4" height="3" depth="0.4" color="#4a3728"></a-box>
      <a-box position="0 0.4 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 1.1 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 1.8 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
      <a-box position="0 2.5 0.1" width="3.8" height="0.05" depth="0.35" color="#3d2e22"></a-box>
    </a-entity>

    <!-- Furniture -->
    <a-entity id="chair" position="3 0 2">
      <a-box position="0 0.45 0" width="0.8" height="0.1" depth="0.8" color="#8b4513"></a-box>
      <a-box position="0 0.9 -0.35" width="0.8" height="0.8" depth="0.1" color="#8b4513"></a-box>
      <a-box position="-0.3 0.2 0.3" width="0.08" height="0.4" depth="0.08" color="#5d3a1a"></a-box>
      <a-box position="0.3 0.2 0.3" width="0.08" height="0.4" depth="0.08" color="#5d3a1a"></a-box>
      <a-box position="-0.3 0.2 -0.3" width="0.08" height="0.4" depth="0.08" color="#5d3a1a"></a-box>
      <a-box position="0.3 0.2 -0.3" width="0.08" height="0.4" depth="0.08" color="#5d3a1a"></a-box>
    </a-entity>

    <a-entity id="side-table" position="4 0 2">
      <a-cylinder position="0 0.5 0" radius="0.3" height="0.05" color="#5d3a1a"></a-cylinder>
      <a-cylinder position="0 0.25 0" radius="0.05" height="0.5" color="#5d3a1a"></a-cylinder>
      <a-cylinder position="0 0 0" radius="0.25" height="0.05" color="#5d3a1a"></a-cylinder>
    </a-entity>

    <a-plane position="0 0.01 0" rotation="-90 0 0" width="5" height="4" color="#4a3650" material="roughness: 1"></a-plane>

    <a-entity id="globe" position="-4 0 3">
      <a-box position="0 0.5 0" width="0.3" height="1" depth="0.3" color="#5d3a1a"></a-box>
      <a-sphere position="0 1.3 0" radius="0.4" color="#2980b9" material="metalness: 0.3; roughness: 0.7"></a-sphere>
    </a-entity>

    <a-plane position="-5.95 2.5 2" rotation="0 90 0" width="2" height="2.5" color="#87ceeb" material="emissive: #87ceeb; emissiveIntensity: 0.3"></a-plane>

    <a-text value="Click to enable mouse look\nWASD to move\nLook at books to see details" position="0 2.5 3" rotation="0 180 0" align="center" color="#aaaaaa" width="4"></a-text>

    <!-- Container for dynamically added books -->
    <a-entity id="books-container"></a-entity>

  </a-scene>

  <script>
    // Book colors - rich, varied palette
    const BOOK_COLORS = [
      '#c41e3a', '#1e5c3a', '#2c3e8c', '#8c6b2c', '#6b2c8c', '#2c8c8c', '#8c2c2c',
      '#e67e22', '#27ae60', '#8e44ad', '#2980b9', '#c0392b', '#16a085', '#d35400',
      '#1abc9c', '#9b59b6', '#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#34495e'
    ];

    // Generate color from string hash
    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return BOOK_COLORS[Math.abs(hash) % BOOK_COLORS.length];
    }

    // Shelf configurations
    const SHELVES = {
      back: {
        parent: 'bookshelf-back',
        shelves: [
          { y: 0.8, width: 5.4, z: 0.15 },   // bottom
          { y: 1.6, width: 5.4, z: 0.15 },
          { y: 2.4, width: 5.4, z: 0.15 },
          { y: 3.2, width: 5.4, z: 0.15 },   // top
        ]
      },
      left: {
        parent: 'bookshelf-left',
        shelves: [
          { y: 0.7, width: 3.4, z: 0.15 },
          { y: 1.4, width: 3.4, z: 0.15 },
          { y: 2.1, width: 3.4, z: 0.15 },
        ]
      },
      right: {
        parent: 'bookshelf-right',
        shelves: [
          { y: 0.7, width: 3.4, z: 0.15 },
          { y: 1.4, width: 3.4, z: 0.15 },
          { y: 2.1, width: 3.4, z: 0.15 },
        ]
      }
    };

    // Create a book entity
    function createBook(book, x, y, z) {
      const el = document.createElement('a-box');
      const width = 0.08 + Math.random() * 0.06;
      const height = 0.5 + Math.random() * 0.2;
      const depth = 0.2;

      el.setAttribute('position', `${x} ${y + height/2} ${z}`);
      el.setAttribute('width', width);
      el.setAttribute('height', height);
      el.setAttribute('depth', depth);
      el.setAttribute('color', stringToColor(book.title));
      el.setAttribute('class', 'book');
      el.setAttribute('data-title', book.title);
      el.setAttribute('data-author', book.author);
      el.setAttribute('data-sample', book.isSample ? 'true' : 'false');

      // Hover events
      el.addEventListener('mouseenter', showBookInfo);
      el.addEventListener('mouseleave', hideBookInfo);

      return { el, width };
    }

    // Show book info popup
    function showBookInfo(evt) {
      const el = evt.target;
      const info = document.getElementById('book-info');
      info.querySelector('.title').textContent = el.getAttribute('data-title');
      info.querySelector('.author').textContent = 'by ' + el.getAttribute('data-author');
      info.querySelector('.sample').textContent = el.getAttribute('data-sample') === 'true' ? '(Sample)' : '';
      info.classList.add('visible');
    }

    function hideBookInfo() {
      document.getElementById('book-info').classList.remove('visible');
    }

    // Place books on shelves
    function placeBooks(books) {
      const container = document.getElementById('books-container');
      let bookIndex = 0;

      // Distribute books across shelves
      const shelfGroups = ['back', 'left', 'right'];

      for (const groupName of shelfGroups) {
        const group = SHELVES[groupName];
        const parent = document.getElementById(group.parent);

        for (const shelf of group.shelves) {
          let x = -shelf.width / 2 + 0.1;

          while (x < shelf.width / 2 - 0.1 && bookIndex < books.length) {
            const book = books[bookIndex];
            const { el, width } = createBook(book, x, shelf.y, shelf.z);
            parent.appendChild(el);

            x += width + 0.02 + Math.random() * 0.03; // Small gap between books
            bookIndex++;
          }
        }
      }

      document.getElementById('stats').textContent = `${bookIndex} books displayed`;
    }

    // Load library and create books
    fetch('kindle_library.json')
      .then(r => r.json())
      .then(books => {
        // Filter out samples if desired, or keep all
        // const owned = books.filter(b => !b.isSample);
        placeBooks(books);
      })
      .catch(err => {
        console.error('Failed to load library:', err);
        document.getElementById('stats').textContent = 'Failed to load library. Run locally with a server.';
      });
  </script>
</body>
</html>
